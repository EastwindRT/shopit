# Render Infrastructure as Code — single Next.js web service.
# Docs: https://render.com/docs/blueprint-spec
#
# To deploy:
#   1. Push this repo to GitHub.
#   2. In the Render dashboard, click "New" → "Blueprint" → select the repo.
#   3. Render reads this file, provisions the service, builds, and deploys.
#
# Caveat: Next.js Edge runtime routes (`runtime: 'edge'`) work on Render but
# are served by a single Node process, not globally distributed.
# That's fine for now — Render still gives us SWR caching + fast warm responses.
# For real edge distribution, point this same repo at Vercel or Cloudflare.

services:
  - type: web
    # Render's internal service name. Keep as-is — Render syncs blueprints by
    # this name; renaming would provision a new service instead of updating the
    # existing one. The public-facing brand is "Scoppa" via the custom domain.
    name: shopit
    runtime: node
    # Free tier: spins down after 15 min idle. Upgrade to 'starter' ($7/mo) for
    # always-warm responses once traffic justifies it.
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    # `--include=dev` forces npm to install devDependencies even when
    # NODE_ENV=production is set. Next.js's build needs tailwindcss / postcss
    # / autoprefixer / typescript, which all live in devDependencies.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      # Node 20+ required for Next.js 15 + React 19.
      - key: NODE_VERSION
        value: 20.18.0
      # Public site URL — used for canonical URLs, sitemap, OG, JSON-LD.
      # Set to your Render subdomain (https://scoppa.shop) or custom domain.
      - key: NEXT_PUBLIC_SITE_URL
        value: https://scoppa.shop
      # UCP overrides — both optional; defaults baked into the client are fine.
      - key: UCP_ENDPOINT
        value: https://catalog.shopify.com/api/ucp/mcp
      - key: UCP_AGENT_PROFILE
        value: https://shopify.dev/ucp/agent-profiles/2026-04-08/valid-with-capabilities.json
      # Force production mode (Render sets this, but explicit for clarity).
      - key: NODE_ENV
        value: production
      # Affiliate monetization — pluggable across universal affiliate
      # networks. Set provider to one of: none / skimlinks / sovrn /
      # cuelinks / custom. The ID is your publisher/account identifier
      # from whichever network approves you.
      #
      # Format reference:
      #   skimlinks   ID = "304358X1792528" (publisherId X siteId)
      #   sovrn       ID = your Sovrn publisher key
      #   cuelinks    ID = your Cuelinks CID
      #   custom      set NEXT_PUBLIC_AFFILIATE_SCRIPT_URL to the raw JS URL
      #
      # IDs aren't secrets — they appear in every outbound affiliate URL.
      - key: NEXT_PUBLIC_AFFILIATE_PROVIDER
        value: none
      - key: NEXT_PUBLIC_AFFILIATE_ID
        sync: false
      - key: NEXT_PUBLIC_AFFILIATE_SCRIPT_URL
        sync: false
      # PostHog analytics — set NEXT_PUBLIC_POSTHOG_KEY in the Render dashboard
      # to your project API key (starts with `phc_`). When unset, the SDK is
      # not loaded — local dev stays clean, no events sent.
      - key: NEXT_PUBLIC_POSTHOG_KEY
        sync: false
      - key: NEXT_PUBLIC_POSTHOG_HOST
        value: https://us.i.posthog.com
    # Response headers (Cache-Control, Content-Type) are configured in
    # next.config.ts under `headers()` — Render's `headers:` block is only for
    # static-site services.
